services:
  postgres:
    image: postgres:16
    container_name: aiobs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_observability
      POSTGRES_USER: sbn
      POSTGRES_PASSWORD: sbn_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbn -d ai_observability"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aiobs_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://sbn:sbn_password@postgres:5432/ai_observability
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      DEFAULT_AGENT_MODEL: ${DEFAULT_AGENT_MODEL:-gpt-4o-mini}
      LATENCY_ALERT_THRESHOLD_MS: ${LATENCY_ALERT_THRESHOLD_MS:-1500}
      COST_ALERT_THRESHOLD: ${COST_ALERT_THRESHOLD:-0.05}
      API_KEY_HEADER_NAME: ${API_KEY_HEADER_NAME:-X-API-Key}
      BOOTSTRAP_ADMIN_API_KEY: ${BOOTSTRAP_ADMIN_API_KEY:-admin-local-dev-key}
      BOOTSTRAP_ANALYST_API_KEY: ${BOOTSTRAP_ANALYST_API_KEY:-analyst-local-dev-key}
      BOOTSTRAP_VIEWER_API_KEY: ${BOOTSTRAP_VIEWER_API_KEY:-viewer-local-dev-key}
      BOOTSTRAP_INGEST_API_KEY: ${BOOTSTRAP_INGEST_API_KEY:-ingest-local-dev-key}
      BOOTSTRAP_ANALYST_PROJECT_SCOPE: ${BOOTSTRAP_ANALYST_PROJECT_SCOPE:-}
      BOOTSTRAP_VIEWER_PROJECT_SCOPE: ${BOOTSTRAP_VIEWER_PROJECT_SCOPE:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SBN_ENCRYPTION_KEY: ${SBN_ENCRYPTION_KEY:-}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aiobs_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data: